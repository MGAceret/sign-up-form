<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Sign-up Form</title>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="banner">
                <img src="src/odin-lined.png"> <h1>ODIN</h1>
            </div>
            <div>
                <p>
                    Photo by
                    <a href="https://unsplash.com/photos/blue-ocean-with-a-distant-boat-and-a-white-railing-t03tATt76jM">Eugenia Pan'kiv</a>
                    on <a href="https://unsplash.com">Unsplash</a> 
                </p>
            </div>
        </div>
        <div class="right">
            <!-- Dummy Text -->
            <div>
                <h2>
                    This is not a real online service! You know you need something like this in your life
                    to help you realize your deepest dreams. Sign up now to get started.
                </h2>
                <br>
                <br>
                <h2>
                    You know you want to.
                </h2>
            </div>

            <!-- Sign-up Form -->
            <div class="sign-up">
                <div>
                    <h2>Let's do this!</h2>
                </div>
                <form action="#" method="POST">
                    <div>
                        <label for="first_name">First Name</label>
                        <input type="text" name="first_name" id="first_name" required placeholder="John">
                    </div>
                    <div>
                        <label for="last_name">Last Name</label>
                        <input type="text" name="last_name" id="last_name" required placeholder="Doe">
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required placeholder="jDoe@gmail.com">
                    </div>
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" name="phone" id="phone" required placeholder="1234567890" minlength="11" maxlength="11">
                    </div>
                    <div>
                        <label for="user_password">Password</label>
                        <input type="Password" name="user_password" id="user_password" required minlength="12">
                    </div>
                    <div>
                        <label for="confirm_password">Confirm Password</label>
                        <input type="Password" name="confirm_password" id="confirm_password" required minlength="12">
                    </div>
            </div>
            <div>
                <button type="submit">Create Account</button>
                </form>
                <div>
                    <p>
                        Already have an account? 
                        <a href="#"><u>Log In</u></a>
                    </p>  
                </div>
            </div>
        </div>
    </div>
</body>
</html>
